name: SN Sync

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Override daily scrape limit (for testing)
        required: false
        type: number
  schedule:
    # Weekdays at 11:00 UTC (~6:00 AM ET). Change cron here to adjust.
    - cron: "0 11 * * 1-5"

concurrency:
  group: sn-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Sales Navigator lists
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LINKEDIN_SESSION_COOKIES: ${{ secrets.LINKEDIN_SESSION_COOKIES }}
      SCRAPE_HEADLESS: "true"
      DAILY_SCRAPE_LIMIT: ${{ vars.DAILY_SCRAPE_LIMIT }}
      SCRAPE_MIN_DELAY_MS: ${{ vars.SCRAPE_MIN_DELAY_MS }}
      SCRAPE_MAX_DELAY_MS: ${{ vars.SCRAPE_MAX_DELAY_MS }}
      MAX_POSTS_PER_PROFILE: ${{ vars.MAX_POSTS_PER_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock', 'packages/sn-scraper/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Sync enabled SN lists
        run: |
          SYNC_ARGS=(--all)
          if [ -n "${{ inputs.limit }}" ]; then
            SYNC_ARGS+=(--limit "${{ inputs.limit }}")
          fi
          bun sn:sync "${SYNC_ARGS[@]}"
